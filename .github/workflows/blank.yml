name: Daily Commit

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update daily file
        run: |
          echo "Daily update: $(date)" >> daily.md

      - name: Commit and push changes
        run: |
          git config --global user.name 'AliBasit1030'
          git config --global user.email 'alibasit1030@gmail.com'
          git add daily.md
          git commit -m \"Daily update: $(date)\" || echo \"No changes to commit\"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
